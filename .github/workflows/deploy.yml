name: Deploy Notebooks to GitHub Pages

on:
  push:
    branches:
      - main  # Change to master if your default branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert jupyter

      - name: Convert All Notebooks to HTML
        run: |
          mkdir public
          
          # Convert every single notebook in the folder to HTML
          jupyter nbconvert --to html *.ipynb --output-dir='public'
          
          # Automatically build a homepage indexing all the converted files
          echo "<html><head><title>My Notebooks</title></head><body>" > public/index.html
          echo "<h1>Project Notebook Previews</h1><ul>" >> public/index.html
          for file in public/*.html; do
            filename=$(basename "$file")
            if [ "$filename" != "index.html" ]; then
              echo "<li><a href='$filename'>${filename%.html}</a></li>" >> public/index.html
            fi
          done
          echo "</ul></body></html>" >> public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
